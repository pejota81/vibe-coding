<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Role — Vibe Coding</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">Vibe Coding</a>
    <ul class="navbar-nav">
      {{#if is_admin}}
      <li><a href="/users">Users</a></li>
      <li><a href="/roles">Roles</a></li>
      <li><a href="/social-platforms">📱 Social Media</a></li>
      <li><a href="/connected-accounts">🔗 Connected Accounts</a></li>
      {{/if}}
      <li class="navbar-user"><a href="/profile" style="color:#e94560;text-decoration:none">👤 {{username}}</a></li>
      <li>
        <form method="POST" action="/logout" style="margin:0">
          <input type="hidden" name="_csrf" value="{{csrf_token}}">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </li>
    </ul>
  </nav>

  <div class="container">
    <div class="card" style="max-width:560px;margin:0 auto">
      <div class="card-header">
        <h2>Edit Role</h2>
        <a href="/roles" class="btn btn-secondary btn-sm">← Back</a>
      </div>

      {{#if error}}
      <div class="alert alert-danger">{{error}}</div>
      {{/if}}

      {{#if role_protected}}
      <div class="alert alert-danger">This is a built-in role. Its name cannot be changed.</div>
      {{/if}}

      <form method="POST" action="/roles/{{role_id}}">
        <input type="hidden" name="_csrf" value="{{csrf_token}}">
        <div class="form-group">
          <label for="name">Role Name</label>
          <input type="text" id="name" name="name" class="form-control"
                 value="{{role_name}}" {{#if role_protected}}readonly{{/if}} required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" name="description" class="form-control"
                 value="{{role_description}}">
        </div>
        <div class="form-group">
          <label>Permissions</label>
          {{permissions_html}}
        </div>
        <div style="display:flex;gap:.75rem;margin-top:1.5rem">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="/roles" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
