<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Platforms — Vibe Coding</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">Vibe Coding</a>
    <ul class="navbar-nav">
      {{#if is_admin}}
      <li><a href="/users">Users</a></li>
      <li><a href="/settings">⚙️ Settings</a></li>
      <li><a href="/roles">Roles</a></li>
      <li><a href="/social-platforms">📱 Social Media</a></li>
      {{/if}}
      <li class="navbar-user"><a href="/profile" style="color:#e94560;text-decoration:none">👤 {{username}}</a></li>
      <li>
        <form method="POST" action="/logout" style="margin:0">
          <input type="hidden" name="_csrf" value="{{csrf_token}}">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </li>
    </ul>
  </nav>

  <div class="container">
    {{#if success}}
    <div class="alert alert-success">{{success}}</div>
    {{/if}}

    {{#if error}}
    <div class="alert alert-danger">{{error}}</div>
    {{/if}}

    <div class="card">
      <div class="card-header">
        <h2>Social Media Platforms</h2>
        <a href="/social-platforms/new" class="btn btn-primary btn-sm">➕ Add Platform</a>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Order</th>
              <th>Name</th>
              <th>URL / Handle Example</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {{platforms_table}}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
