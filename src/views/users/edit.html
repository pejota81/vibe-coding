<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User — Vibe Coding</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">Vibe Coding</a>
    <ul class="navbar-nav">
      {{#if is_admin}}
      <li><a href="/users">Users</a></li>
      <li><a href="/settings">⚙️ Settings</a></li>
      <li><a href="/roles">Roles</a></li>
      {{/if}}
      <li class="navbar-user"><a href="/profile" style="color:#e94560;text-decoration:none">👤 {{username}}</a></li>
      <li>
        <form method="POST" action="/logout" style="margin:0">
          <input type="hidden" name="_csrf" value="{{csrf_token}}">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </li>
    </ul>
  </nav>

  <div class="container">
    <div class="card" style="max-width:560px;margin:0 auto">
      <div class="card-header">
        <h2>Edit User</h2>
        <a href="{{back_url}}" class="btn btn-secondary btn-sm">← Back</a>
      </div>

      {{#if error}}
      <div class="alert alert-danger">{{error}}</div>
      {{/if}}

      <form method="POST" action="/users/{{user_id}}">
        <input type="hidden" name="_csrf" value="{{csrf_token}}">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-control"
                 value="{{user_username}}" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control"
                 value="{{user_email}}" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Leave blank to keep current password">
          <p class="hint">Leave blank to keep the existing password.</p>
        </div>
        {{#if is_admin}}
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role" class="form-control">
            {{role_options}}
          </select>
        </div>
        {{/if}}
        <div style="display:flex;gap:.75rem;margin-top:1.5rem">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{back_url}}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
